<!-- more -->
<h2 id="我">我</h2>
<p>意天。<br>
生活却不止一天。</p>
<blockquote>
<p>那年的秋季特别长，像一段雏形的永恒。<br>
我几乎以为，站在四围的秋色里，那种圆溜溜的成熟感，<br>
会永远悬在那里，不坠下来。</p>
</blockquote>
<p>我开始撰写我的生活，追溯到每一天。<br>
因为能留在我的长河里的只是零散的片段。<br>
我甚至想听自己歌唱。<br>
我妄图改变很多，拟定的蓝图永远画不出第一笔。</p>
<h2 id="你">你</h2>
<p>你好。<br>
或许我们更早就应该认识。<br>
希望你路过，也能为我驻足。</p>
